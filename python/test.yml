name: Tests

on:
  push:
    branches: ["main", "develop"]
  pull_request:
    branches: ["main"]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install ".[dev]"

      - name: Run unit and mock tests
        # Integration tests are excluded — they require Windows Auth
        # which cannot run on GitHub Actions hosted runners.
        # Run locally with: pytest --run-integration
        run: pytest -k "not integration"
